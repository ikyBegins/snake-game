<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  .game-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    max-width: 600px;
    padding: 8px;
    gap: 6px;
  }

  /* HUD bar */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: #111;
    border-radius: 8px;
    padding: 6px 14px;
    flex-shrink: 0;
  }

  .hud span {
    color: #9bab2c;
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* Screen */
  .screen-wrap {
    position: relative;
    flex: 1;
    max-height: 50vh;
    width: 100%
    min-height: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 0 3px #2a2a2a, 0 0 30px rgba(155,171,44,0.15);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    background: #9bab2c;
  }

  /* Overlay */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(155, 171, 44, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }

  #overlay.hidden { display: none; }

  #overlay .title {
    font-size: clamp(22px, 6vw, 36px);
    color: #1a2400;
    font-weight: bold;
    letter-spacing: 3px;
  }

  #overlay .subtitle {
    font-size: clamp(11px, 3vw, 15px);
    color: #2a3a00;
    text-align: center;
    line-height: 1.6;
  }

  #overlay .hs-box {
    background: rgba(0,0,0,0.12);
    border-radius: 6px;
    padding: 8px 20px;
    min-width: 160px;
  }

  #overlay .hs-box .hs-title {
    font-size: 11px;
    color: #1a2400;
    font-weight: bold;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  #overlay .hs-list div {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #1a2400;
    border-bottom: 1px dashed rgba(26,36,0,0.3);
    padding: 2px 0;
    gap: 20px;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    padding-bottom: 4px;
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 7px;
    width: 220px;
    height: 220px;
  }

  .dpad button {
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border: 1px solid #333;
    border-radius: 8px;
    color: #9bab2c;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 0 #0a0a0a, inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform 0.05s, box-shadow 0.05s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .dpad button:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #0a0a0a;
  }

  .dpad .center {
    background: linear-gradient(145deg, #333, #222);
    color: #9bab2c;
    font-size: 10px;
    letter-spacing: 0.5px;
    border-radius: 50%;
  }

  .action-row {
    display: flex;
    gap: 16px;
  }

  .btn {
    min-width: 80px;
    height: 38px;
    border: none;
    border-radius: 19px;
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 0 #0a0a0a;
    transition: transform 0.05s, box-shadow 0.05s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0a0a; }

  .btn-green {
    background: linear-gradient(145deg, #2a7a2a, #194f19);
    color: #7fcc7f;
  }

  .btn-red {
    background: linear-gradient(145deg, #7a1a1a, #4f0f0f);
    color: #cc7070;
  }
</style>
</head>
<body>

<div class="game-wrap">
  <!-- HUD -->
  <div class="hud">
    <span id="score-label">SCORE: 0</span>
    <span id="level-label">LVL 1</span>
    <span id="hi-label">HI: 0</span>
    <span id="lives-label">▪▪▪</span>
  </div>

  <!-- Screen -->
  <div class="screen-wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <div class="title" id="overlay-title">SNAKE</div>
      <div class="subtitle" id="overlay-sub">Press OK to start</div>
      <div class="hs-box" id="hs-box" style="display:none">
        <div class="hs-title">HIGHSCORES</div>
        <div class="hs-list" id="hs-list"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="dpad">
      <div></div>
      <button style="grid-column:2;grid-row:1" id="btn-up">▲</button>
      <div></div>
      <button style="grid-column:1;grid-row:2" id="btn-left">◀</button>
      <button class="center" style="grid-column:2;grid-row:2" id="btn-ok">OK</button>
      <button style="grid-column:3;grid-row:2" id="btn-right">▶</button>
      <div></div>
      <button style="grid-column:2;grid-row:3" id="btn-down">▼</button>
      <div></div>
    </div>
    <div class="action-row">
      <button class="btn btn-green" id="btn-start">START</button>
      <button class="btn btn-red" id="btn-pause">PAUSE</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://kbwqufuxrrgcfntybakr.supabase.co";
const SUPABASE_KEY = "sb_publishable_ysqDaIdA0TxEc-QDnDFrSw_OYkhjkH7";
async function sendScore(name, score) {
  await fetch(SUPABASE_URL + "/rest/v1/scores", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      score: score
    })
  });
}
async function getLeaderboard() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/scores?select=*&order=score.desc&limit=10",
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  return await res.json();
}
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas sizing
const COLS = 28, ROWS = 21;
let CELL = 12;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  CELL = Math.floor(Math.min(w / COLS, h / ROWS));
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (gameState === 'playing') draw();
  else drawIdle();
}

window.addEventListener('resize', resizeCanvas);

const BG = '#9bab2c', GRID = '#8fa828', SNAKE_HEAD = '#1a2400', SNAKE_BODY = '#2a3a00', FOOD_COLOR = '#1a2400';

let snake, dir, nextDir, food, score, hiScore, level, speed, gameState, paused, interval, lives;
let highscores = [];
try { highscores = JSON.parse(localStorage.getItem('snake_hs') || '[]'); } catch(e) {}

function init() {
  snake = [{x:14,y:10},{x:13,y:10},{x:12,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  lives = 1;
  level = 1;
  speed = 180;
  paused = false;
  placeFood();
  updateHUD();
}

function placeFood() {
  let pos;
  do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

function gameLoop() {
  if (paused || gameState !== 'playing') return;
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) { die(); return; }
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) { die(); return; }
  snake.unshift(head);
  if (head.x===food.x&&head.y===food.y) {
    score += 10*level;
    placeFood();
    if (score>0 && score%(50*level)===0) { level++; speed=Math.max(60,speed-20); restartInterval(); }
    updateHUD();
  } else { snake.pop(); }
  draw();
}

function die() {
  lives--;
  updateHUD();
  if (lives<=0) { gameOver(); return; }
  clearInterval(interval);
  snake=[{x:14,y:10},{x:13,y:10},{x:12,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  draw();
  // Short pause so player sees the reset before game continues
  setTimeout(() => {
    if (gameState === 'playing') interval = setInterval(gameLoop, speed);
  }, 800);
}

function gameOver() {
   let name = prompt("Enter your name:");
  if (name) {
    sendScore(name, score);
  }
  clearInterval(interval);
  gameState = 'gameover';
  highscores.push(score);
  highscores.sort((a,b)=>b-a);
  highscores = highscores.slice(0,5);
  try { localStorage.setItem('snake_hs', JSON.stringify(highscores)); } catch(e) {}
  hiScore = highscores[0]||0;
  showOverlay('GAME OVER', `Score: ${score}\nPress OK to retry`);
  updateHUD();
}

function draw() {
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = GRID;
  for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++) ctx.fillRect(x*CELL+Math.floor(CELL/2),y*CELL+Math.floor(CELL/2),1,1);

  // Food
  ctx.fillStyle = FOOD_COLOR;
  const fx=food.x*CELL, fy=food.y*CELL;
  ctx.fillRect(fx+1,fy+1,CELL-2,CELL-2);
  ctx.fillStyle = BG;
  ctx.fillRect(fx+2,fy+2,CELL-4,CELL-4);
  ctx.fillStyle = FOOD_COLOR;
  ctx.fillRect(fx+Math.floor(CELL*0.3),fy+Math.floor(CELL*0.3),Math.ceil(CELL*0.4),Math.ceil(CELL*0.4));

  // Body
  for (let i=snake.length-1;i>=1;i--) {
    const s=snake[i];
    ctx.fillStyle = SNAKE_BODY;
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
  }

  // Head
  const h=snake[0];
  ctx.fillStyle = SNAKE_HEAD;
  ctx.fillRect(h.x*CELL,h.y*CELL,CELL,CELL);
  const e=Math.max(1,Math.floor(CELL*0.22));
  const eo=Math.max(1,Math.floor(CELL*0.18));
  ctx.fillStyle = BG;
  if (dir.x===1) { ctx.fillRect(h.x*CELL+CELL-eo-e,h.y*CELL+eo,e,e); ctx.fillRect(h.x*CELL+CELL-eo-e,h.y*CELL+CELL-eo-e,e,e); }
  else if(dir.x===-1) { ctx.fillRect(h.x*CELL+eo,h.y*CELL+eo,e,e); ctx.fillRect(h.x*CELL+eo,h.y*CELL+CELL-eo-e,e,e); }
  else if(dir.y===-1) { ctx.fillRect(h.x*CELL+eo,h.y*CELL+eo,e,e); ctx.fillRect(h.x*CELL+CELL-eo-e,h.y*CELL+eo,e,e); }
  else if(dir.y===1) { ctx.fillRect(h.x*CELL+eo,h.y*CELL+CELL-eo-e,e,e); ctx.fillRect(h.x*CELL+CELL-eo-e,h.y*CELL+CELL-eo-e,e,e); }
}

function drawIdle() {
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = GRID;
  for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++) ctx.fillRect(x*CELL+Math.floor(CELL/2),y*CELL+Math.floor(CELL/2),1,1);
}

function updateHUD() {
  document.getElementById('score-label').textContent = `SCORE: ${score||0}`;
  document.getElementById('level-label').textContent = `LVL ${level||1}`;
  document.getElementById('hi-label').textContent = `HI: ${highscores[0]||0}`;
  document.getElementById('lives-label').textContent = '▪'.repeat(Math.max(0,lives||0))+'▫'.repeat(Math.max(0,3-(lives||0)));
}

function showOverlay(title, sub) {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent = sub;
  const hsBox = document.getElementById('hs-box');
  const hsList = document.getElementById('hs-list');
  if (highscores.length) {
    hsBox.style.display = 'block';
    hsList.innerHTML = highscores.map((s,i)=>`<div><span>${i+1}.</span><span>${s}</span></div>`).join('');
  } else {
    hsBox.style.display = 'none';
  }
}

function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

function startGame() {
  clearInterval(interval);
  init();
  hideOverlay();
  gameState = 'playing';
  draw();
  interval = setInterval(gameLoop, speed);
}

function restartInterval() { clearInterval(interval); interval = setInterval(gameLoop, speed); }

function togglePause() {
  if (gameState !== 'playing') return;
  paused = !paused;
  if (paused) showOverlay('PAUSED', 'Press PAUSE to resume');
  else hideOverlay();
}

function setDir(x, y) {
  if (gameState !== 'playing' || paused) return;
  if (x!==0 && dir.x===-x) return;
  if (y!==0 && dir.y===-y) return;
  nextDir = {x, y};
}

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': e.preventDefault(); setDir(0,-1); break;
    case 'ArrowDown': e.preventDefault(); setDir(0,1); break;
    case 'ArrowLeft': e.preventDefault(); setDir(-1,0); break;
    case 'ArrowRight': e.preventDefault(); setDir(1,0); break;
    case 'Enter': case ' ':
      if (gameState !== 'playing') startGame(); else togglePause(); break;
    case 'Escape': togglePause(); break;
  }
});

// Buttons
document.getElementById('btn-up').addEventListener('click', ()=>setDir(0,-1));
document.getElementById('btn-down').addEventListener('click', ()=>setDir(0,1));
document.getElementById('btn-left').addEventListener('click', ()=>setDir(-1,0));
document.getElementById('btn-right').addEventListener('click', ()=>setDir(1,0));
document.getElementById('btn-ok').addEventListener('click', ()=>{ if(gameState!=='playing') startGame(); else togglePause(); });
document.getElementById('btn-start').addEventListener('click', ()=>startGame());
document.getElementById('btn-pause').addEventListener('click', ()=>togglePause());

// Swipe support
let tx=0, ty=0;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if (Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
}, {passive:true});

// Boot
gameState = 'menu';
updateHUD();
resizeCanvas();
showOverlay('SNAKE', 'Press OK or START to play');
</script>
</body>
</html>
